<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Hollow Beneath Ashfall</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="gameRoot" aria-label="The Hollow Beneath Ashfall">
    <canvas id="gameCanvas" width="480" height="270"></canvas>
    <div id="vignette"></div>

    <section id="bootOverlay" class="overlay visible">
      <div class="panel title-panel">
        <p class="kicker">Ashfall County Line</p>
        <h1>The Hollow Beneath Ashfall</h1>
        <p id="bootStatus">Loading the road into town...</p>
      </div>
    </section>

    <section id="mainMenu" class="overlay visible">
      <div class="panel title-panel">
        <p class="kicker">The bell has already rung.</p>
        <h1>The Hollow Beneath Ashfall</h1>
        <div class="menu-list">
          <button data-action="newGame">New Game</button>
          <button data-action="continue">Continue</button>
          <button data-action="load">Load</button>
          <button data-action="settings">Settings</button>
        </div>
      </div>
    </section>

    <section id="pauseMenu" class="overlay">
      <div class="panel">
        <h2>Paused</h2>
        <div class="menu-list">
          <button data-action="resume">Resume</button>
          <button data-action="inventory">Inventory</button>
          <button data-action="journal">Journal</button>
          <button data-action="save">Save</button>
          <button data-action="settings">Settings</button>
          <button data-action="mainMenu">Main Menu</button>
        </div>
      </div>
    </section>

    <section id="modalOverlay" class="overlay">
      <div id="modalPanel" class="panel wide"></div>
    </section>

    <section id="dialogueBox" class="dialogue hidden">
      <div class="portrait" id="dialoguePortrait"></div>
      <div class="dialogue-copy">
        <h3 id="dialogueSpeaker"></h3>
        <p id="dialogueText"></p>
        <div id="dialogueChoices" class="choices"></div>
      </div>
    </section>

    <section id="hud" class="hud hidden">
      <div class="bar"><span>Health</span><i id="hpFill"></i></div>
      <div class="bar stamina"><span>Stamina</span><i id="staminaFill"></i></div>
      <div class="bar memory"><span>Memory</span><i id="memoryFill"></i></div>
      <div id="areaName" class="area-name"></div>
      <div id="toast" class="toast"></div>
    </section>
  </main>

  <script src="src/content/assets.js"></script>
  <script src="src/content/items.js"></script>
  <script src="src/content/quests.js"></script>
  <script src="src/content/enemies.js"></script>
  <script src="src/content/bosses.js"></script>
  <script src="src/content/dialogue.js"></script>
  <script src="src/content/story.js"></script>
  <script src="src/content/maps.js"></script>
  <script src="src/engine/state.js"></script>
  <script src="src/engine/assets.js"></script>
  <script src="src/engine/audio.js"></script>
  <script src="src/engine/input.js"></script>
  <script src="src/engine/collision.js"></script>
  <script src="src/engine/renderer.js"></script>
  <script src="src/systems/quests.js"></script>
  <script src="src/systems/inventory.js"></script>
  <script src="src/systems/memory.js"></script>
  <script src="src/systems/player.js"></script>
  <script src="src/systems/enemies.js"></script>
  <script src="src/systems/combat.js"></script>
  <script src="src/systems/maps.js"></script>
  <script src="src/systems/dialogue.js"></script>
  <script src="src/systems/save.js"></script>
  <script src="src/systems/endings.js"></script>
  <script src="src/systems/ui.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
